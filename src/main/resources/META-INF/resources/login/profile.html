    <!--네비바→ index.html과 동일하게 복사-->
    <!-- 네비바 아래 -->
    <section class="hero d-flex align-items-center justify-content-center text-center py-5">
        <div class="container" style="max-width: 600px;">

            <h2 class="fw-bold mb-4">
                👤 내 프로필
            </h2>

            <div class="mb-4">
                <img id="profileImg"
                    src="/uploads/profile/default.png"
                    class="rounded-circle"
                    width="120"
                    height="120"
                    style="object-fit:cover; border:3px solid #fff;"
                    alt="프로필 사진">
            </div>

            <!-- 회원 정보 -->
            <div class="card bg-dark text-white border-secondary mb-4">

                <div class="card-body text-start">

                    <table class="table table-dark table-bordered mb-0">

                        <tr>
                            <th style="width:30%;">아이디</th>
                            <td id="infoUsername"></td>
                        </tr>

                        <tr>
                            <th>이메일</th>
                            <td id="infoEmail"></td>
                        </tr>

                        <tr>
                            <th>연락처</th>
                            <td id="infoPhone"></td>
                        </tr>

                    </table>

                    <hr class="my-4">

                    <!-- 개인정보 수정 버튼 -->
                    <button class="btn btn-warning w-100 mb-3"
                            type="button"
                            data-bs-toggle="collapse"
                            data-bs-target="#updateFormArea">
                        개인정보 수정
                    </button>

                    <!-- 개인정보 수정 영역 -->
                    <div class="collapse"
                        id="updateFormArea">

                        <div class="card card-body bg-dark border-secondary">

                            <div id="updateMsg"
                                class="alert d-none mb-3">
                            </div>

                            <form id="updateForm"
                                method="POST"
                                action="/profile/update">

                                <div class="mb-3">

                                    <label class="form-label">
                                        이메일
                                    </label>

                                    <input type="text"
                                        class="form-control"
                                        id="updateEmail"
                                        name="email"
                                        placeholder="example@email.com">

                                    <div class="invalid-feedback"
                                        id="updateEmailMsg">
                                    </div>

                                </div>

                                <div class="mb-3">

                                    <label class="form-label">
                                        연락처
                                    </label>

                                    <input type="text"
                                        class="form-control"
                                        id="updatePhone"
                                        name="phone"
                                        placeholder="010-0000-0000">

                                    <div class="invalid-feedback"
                                        id="updatePhoneMsg">
                                    </div>

                                </div>

                                <button type="button"
                                        class="btn btn-warning w-100"
                                        onclick="validateAndUpdate()">
                                    수정 완료
                                </button>

                            </form>

                        </div>

                    </div>

                </div>

            </div>

            <!-- 비밀번호 변경 -->
            <div class="card bg-dark text-white border-secondary mb-4">

                <div class="card-body text-start">

                    <h5 class="mb-3">
                        🔒 비밀번호 변경
                    </h5>

                    <div id="pwMsg"
                        class="alert d-none mb-3">
                    </div>

                    <form id="pwForm"
                        method="POST"
                        action="/profile/password">

                        <div class="mb-3">

                            <label class="form-label">
                                현재 비밀번호
                            </label>

                            <input type="password"
                                class="form-control"
                                id="currentPwInput">

                            <div class="invalid-feedback"
                                id="currentPwMsg">
                            </div>

                            <input type="hidden"
                                id="currentPassword"
                                name="currentPassword">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                새 비밀번호
                            </label>

                            <input type="password"
                                class="form-control"
                                id="newPwInput">

                            <div class="invalid-feedback"
                                id="newPwMsg">
                            </div>

                            <input type="hidden"
                                id="newPassword"
                                name="newPassword">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                새 비밀번호 확인
                            </label>

                            <input type="password"
                                class="form-control"
                                id="newPwConfirm">

                            <div class="invalid-feedback"
                                id="newPwConfirmMsg">
                            </div>

                        </div>

                        <button type="button"
                                class="btn btn-danger w-100"
                                onclick="validateAndChangePassword()">
                            비밀번호 변경
                        </button>

                    </form>

                </div>

            </div>

            <!-- 오류 메시지 -->
            <div id="uploadErrorMsg"
                class="alert alert-danger d-none mb-3">
            </div>

            <!-- 프로필 사진 업로드 -->
            <form id="uploadForm"
                method="POST"
                action="/profile/upload"
                enctype="multipart/form-data">

                <div class="mb-3 text-start">

                    <label class="form-label">
                        프로필 사진 변경
                    </label>

                    <input type="file"
                        class="form-control"
                        name="profileImage"
                        accept="image/*"
                        required>
                </div>

                <button type="submit"
                        class="btn btn-primary w-100 mb-2">
                    사진 업로드
                </button>

                <a href="/after_login"
                class="btn btn-outline-secondary w-100">
                    메인으로 가기
                </a>

            </form>

        </div>
    </section>

    <div class="toast-container position-fixed bottom-0 end-0 p-3"
     style="z-index:9999">

        <div id="liveToast"
            class="toast align-items-center text-white bg-success border-0">

            <div class="d-flex">

                <div class="toast-body"
                    id="toastBody">
                    메시지
                </div>

                <button type="button"
                        class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast">
                </button>

            </div>

        </div>

    </div>
