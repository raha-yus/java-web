    <!--네비바→ index.html과동일하게복사-->
    <section class="hero d-flex align-items-center justify-content-center text-center py-5">
        <div class="container" style="max-width: 500px;">
            <h2 class="fw-bold mb-4">👤 내 프로필</h2>

            <div class="mb-4">
                <img id="profileImg"
                    src="/uploads/profile/default.png"
                    class="rounded-circle"
                    width="120" height="120"
                    style="object-fit:cover; border:3px solid #fff;"
                    alt="프로필 사진">
            </div>

            <div class="card bg-dark text-white border-secondary mb-4">
                <div class="card-body text-start">
                    <table class="table table-dark table-bordered mb-0">
                        <tr>
                            <th style="width:30%;">아이디</th>
                            <td id="infoUsername"></td>
                        </tr>
                        <tr>
                            <th>이메일</th>
                            <td id="infoEmail"></td>
                        </tr>
                        <tr>
                            <th>연락처</th>
                            <td id="infoPhone"></td>
                        </tr>
                    </table>

                    <hr class="border-secondary my-4"> <div class="mb-3 text-start">
                        <label class="form-label">연락처 수정</label>
                        <input type="text" class="form-control bg-dark text-white border-secondary"
                               id="updatePhone" name="phone"
                               placeholder="010-0000-0000">
                        <div class="invalid-feedback" id="updatePhoneMsg"></div>
                    </div>

                    <button type="button"
                            class="btn btn-warning w-100"
                            onclick="validateAndUpdate()">
                        수정 완료
                    </button>
                    
                </div>
            </div>
            <form id="uploadForm" method="POST" action="/profile/upload" enctype="multipart/form-data">
                <div class="mb-3 text-start">
                    <label class="form-label">프로필 사진 변경</label>
                    <input type="file" class="form-control" name="file" accept="image/*" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 mb-2">사진 업로드</button>
                <a href="/after_login" class="btn btn-outline-secondary w-100">메인으로 가기</a>
            </form>
        </div>
    </section>

    <script src="/js/bootstrap.bundle.min.js"></script>
